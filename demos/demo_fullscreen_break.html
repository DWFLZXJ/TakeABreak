<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take a Break — 全屏休息提醒 Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Noto+Serif+SC:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  /* ===== Wallpaper Background ===== */
  .wallpaper {
    position: fixed;
    inset: 0;
    /* Simulated beautiful wallpaper using CSS gradients */
    background:
      radial-gradient(ellipse at 20% 50%, rgba(120, 119, 198, 0.35) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255, 166, 158, 0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(108, 200, 220, 0.3) 0%, transparent 55%),
      radial-gradient(ellipse at 40% 30%, rgba(168, 130, 220, 0.2) 0%, transparent 50%),
      linear-gradient(160deg, #0f0c29 0%, #1a1a3e 30%, #24243e 60%, #1a1a2e 100%);
    z-index: 0;
  }

  /* Subtle animated grain texture */
  .wallpaper::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
  }

  /* ===== Floating orbs (ambient animation) ===== */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: floatOrb 20s ease-in-out infinite;
    z-index: 1;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: #7c3aed;
    top: -100px; left: -100px;
    animation-delay: 0s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: #06b6d4;
    bottom: -80px; right: -80px;
    animation-delay: -7s;
    animation-duration: 25s;
  }
  .orb-3 {
    width: 350px; height: 350px;
    background: #f472b6;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-delay: -14s;
    animation-duration: 30s;
  }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(60px, -40px) scale(1.1); }
    66% { transform: translate(-40px, 30px) scale(0.95); }
  }

  /* ===== Main Content ===== */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    animation: fadeIn 1.2s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Floating Text Card ===== */
  .text-card {
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 48px 64px;
    text-align: center;
    max-width: 680px;
    box-shadow:
      0 32px 80px rgba(0, 0, 0, 0.25),
      inset 0 1px 0 rgba(255, 255, 255, 0.08);
    animation: cardFloat 6s ease-in-out infinite;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .text-card h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.92);
    line-height: 1.6;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .text-card .subtitle {
    font-size: 14px;
    font-weight: 300;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  /* ===== Timer ===== */
  .break-timer {
    text-align: center;
  }

  .break-timer-value {
    font-size: 72px;
    font-weight: 200;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 8px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }

  .break-timer-label {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.3);
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* ===== Progress bar ===== */
  .progress-bar {
    width: 280px;
    height: 3px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, #818cf8, #c084fc);
    border-radius: 2px;
    transition: width 1s linear;
  }

  /* ===== Skip Button ===== */
  .skip-btn {
    position: fixed;
    bottom: 48px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 10px 28px;
    color: rgba(255, 255, 255, 0.45);
    font-size: 13px;
    font-family: inherit;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s;
    z-index: 20;
  }
  .skip-btn:hover {
    background: rgba(255, 255, 255, 0.14);
    color: rgba(255, 255, 255, 0.75);
    border-color: rgba(255, 255, 255, 0.2);
  }

  /* ===== Top-left clock ===== */
  .clock {
    position: fixed;
    top: 24px;
    left: 32px;
    z-index: 20;
    color: rgba(255, 255, 255, 0.25);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  /* ===== Demo label ===== */
  .demo-label {
    position: fixed;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    color: rgba(255,255,255,0.15);
    z-index: 20;
  }
</style>
</head>
<body>

<!-- Wallpaper -->
<div class="wallpaper"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- Clock -->
<div class="clock" id="clock">09:36</div>

<!-- Main Content -->
<div class="content">
  <div class="text-card">
    <h1>休息一下，眺望远方</h1>
    <div class="subtitle">你已经连续工作了 25 分钟</div>
  </div>

  <div class="break-timer">
    <div class="break-timer-value" id="breakTimer">03:42</div>
    <div class="break-timer-label">休息剩余时间</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- Skip Button -->
<button class="skip-btn">跳过休息 →</button>

<div class="demo-label">Demo 2 / 3 — 全屏休息提醒</div>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Break timer countdown
  let breakSeconds = 3 * 60 + 42;
  const totalBreak = 5 * 60;
  const timerEl = document.getElementById('breakTimer');
  const fillEl = document.getElementById('progressFill');

  function updateBreakTimer() {
    if (breakSeconds <= 0) return;
    breakSeconds--;
    const m = Math.floor(breakSeconds / 60).toString().padStart(2, '0');
    const s = (breakSeconds % 60).toString().padStart(2, '0');
    timerEl.textContent = `${m}:${s}`;
    fillEl.style.width = `${((totalBreak - breakSeconds) / totalBreak) * 100}%`;
  }

  setInterval(updateBreakTimer, 1000);
</script>
</body>
</html>
